### Window Rules

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus 1, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# chordwatch (Wine/qode.exe): small always-on-top util, keep floating + pinned
windowrule = float 1, match:class ^(qode\.exe)$
windowrule = pin 1, match:class ^(qode\.exe)$
# Uncomment + tune if it floats at wrong size:
# windowrule = size 760 210, match:class ^(qode\.exe)$
# windowrule = move 100%-780 40, match:class ^(qode\.exe)$
