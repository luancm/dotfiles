# ~/.config/tmux/tmux.conf
# A small, well-commented starting point. Read top to bottom and grow it
# gradually. Reload after edits with:  prefix r

#### Prefix ####################################################################
unbind C-b
set -g prefix C-a
# Double-tap the prefix to send a literal C-a *through* to a nested tmux
# (e.g. one running over SSH inside this one):
#   C-a        -> talks to the outer (local) tmux
#   C-a C-a    -> talks to the inner (remote) tmux (send-prefix)
bind C-a send-prefix

#### Sensible base options #####################################################
set -g mouse on                 # click to select panes, drag borders, scroll
set -g base-index 1             # number windows from 1 (matches the keyboard)
setw -g pane-base-index 1       # number panes from 1
set -g renumber-windows on      # close a window -> renumber the rest, no gaps
set -g history-limit 1000000    # generous scrollback
set -sg escape-time 10          # ms to tell a bare ESC from an escape seq; kills Neovim's Esc lag (default 500)
set -g focus-events on          # forward focus events to apps (Neovim autoread)
set -g set-clipboard on         # yank to the system clipboard via OSC52
setw -g mode-keys vi            # vi-style keys in copy mode
set -g display-time 4000        # show status messages for 4s (default ~750ms)
setw -g aggressive-resize on    # size each window to the smallest *attached* client

# Colors: inside tmux $TERM is "tmux-256color"; tell apps the *outer* terminal
# supports 24-bit color so Neovim & friends render true colors.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*ghostty*:RGB,xterm-ghostty:RGB"

#### Reload ####################################################################
# prefix r  ->  reload this file without restarting the server
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

#### Splits, panes & windows ###################################################
# Open new splits/windows in the *current* pane's directory.
bind | split-window -h -c "#{pane_current_path}"   # vertical line = side-by-side
bind - split-window -v -c "#{pane_current_path}"   # dash = stacked
bind c new-window -c "#{pane_current_path}"
# Keep the default " and % splits too, but make them path-aware.
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Resize panes with prefix + H/J/K/L (repeatable: hold and tap).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#### Copy mode (vi-style) ######################################################
# prefix [   enter copy mode, then:  v = start selection, y = yank, q = quit
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Scroll 3 lines per wheel notch instead of the default 5 -> smoother, less jumpy.
bind -T copy-mode-vi WheelUpPane   select-pane \; send -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send -X -N 3 scroll-down

#### Sesh: smart session switcher ##############################################
# prefix T  ->  fuzzy-pick a session / project / zoxide dir and jump to it.
# Requires `sesh` + `fzf` (both installed via the dotfiles dependency scripts).
bind T display-popup -E -w 80% -h 70% \
  "sesh connect \"$(sesh list -i | fzf --ansi --no-sort --prompt 'sesh ')\""

#### Status bar (Catppuccin Mocha, hand-rolled) ################################
# A minimal status line styled to match your Ghostty terminal. Tweak the hex
# colors below; this is intentionally plugin-free so it's easy to learn from.
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
# Solid bar background (mantle) so the pills below sit a shade brighter.
set -g status-style "bg=#181825,fg=#cdd6f4"

# Pill anatomy: each segment is three parts -
#    left rounded cap   #[fg=PILL,bg=BAR]
#   content (icon+text)  #[fg=BAR,bg=PILL]
#    right rounded cap   #[fg=PILL,bg=BAR]
# The caps are Nerd Font half-circles; swap them for  /  to get arrows.
set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bg=#181825]#[fg=#1e1e2e,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#181825] "

set -g status-right-length 100
set -g status-right "#[fg=#cba6f7,bg=#181825]#[fg=#1e1e2e,bg=#cba6f7,bold]  %a %d %b #[fg=#cba6f7,bg=#181825] #[fg=#89dceb,bg=#181825]#[fg=#1e1e2e,bg=#89dceb,bold]  %H:%M #[fg=#89dceb,bg=#181825] #[fg=#a6e3a1,bg=#181825]#[fg=#1e1e2e,bg=#a6e3a1,bold]  #h #[fg=#a6e3a1,bg=#181825]"

# Inactive windows: subtle surface pill. Active window: peach pill.
# Pills carry their own spacing, so drop the default inter-window separator.
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#313244,bg=#181825]#[fg=#cdd6f4,bg=#313244] #I:#W#{?window_flags,#{window_flags}, } #[fg=#313244,bg=#181825] "
setw -g window-status-current-format "#[fg=#fab387,bg=#181825]#[fg=#1e1e2e,bg=#fab387,bold] #I:#W#{?window_flags,#{window_flags}, } #[fg=#fab387,bg=#181825] "

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#89b4fa,fg=#1e1e2e"

#### Plugins (TPM) #############################################################
# Manage from inside tmux:
#   prefix + I   install plugins listed below
#   prefix + U   update plugins
#   prefix + alt-u  remove plugins no longer listed
#
# vim-tmux-navigator : C-h/j/k/l moves between tmux panes AND Neovim splits
#                      (pairs with the Neovim plugin of the same name)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# --- Grow-later options (uncomment, then press prefix + I to install) --------
# Persist & auto-restore sessions across reboots:
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore 'on'
#
# A full theming plugin (replaces the hand-rolled status bar above). Its v2
# API needs extra setup, so read its README before enabling:
# set -g @plugin 'catppuccin/tmux'
# set -g @catppuccin_flavour 'mocha'

# Initialize TPM — keep this line at the very bottom of the file.
run '~/.config/tmux/plugins/tpm/tpm'
